<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Daily Dashboard</title>
  <style>
    /* Dark mode styles */
    body { background-color: #1a1a1a; color: #f2f2f2; font-family: Arial, sans-serif; }
    a { color: #4da6ff; text-decoration: none; }
    .container { max-width: 800px; margin: 0 auto; padding: 20px; }
    .section { margin-bottom: 30px; }
    .section h2 { margin-top: 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="section">
      <h2>Weather</h2>
      <div class="weather-widget">
        <a href="https://weather.com/weather/today/l/USCA0210:1:US">Concord, CA Weather</a>
      </div>
    </div>

    <div class="section">
      <h2>Sports Betting</h2>
      <div class="nfl-odds">
        <h3>NFL Odds</h3>
        <a href="https://www.espn.com/nfl/lines">NFL Odds & Spreads</a>
      </div>
      <div class="nba-odds">
        <h3>NBA Odds</h3>
        <a href="https://www.espn.com/nba/lines">NBA Odds & Spreads</a>
      </div>
    </div>

    <div class="section">
      <h2>Madden YouTube</h2>
      <iframe width="560" height="315" src="https://www.youtube.com/embed/videoseries?list=PL1fsQFG7-sBUuc4euCJdZDUwxh4mWLkp" frameborder="0" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>
  </div>
</body>
</html>
